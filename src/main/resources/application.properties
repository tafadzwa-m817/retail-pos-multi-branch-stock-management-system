spring.application.name=retail-pos-system

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:retaildb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=cmV0YWlsUG9zU3lzdGVtU2VjcmV0S2V5Rm9ySlduVG9rZW5HZW5lcmF0aW9uMjAyNA==
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# Server
server.port=8080

# Email (set spring.mail.enabled=true and configure SMTP to activate)
spring.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.from=noreply@july28retail.co.zw

# Tax
tax.default-rate=15.0

# Admin alert email for low-stock notifications
admin.alert-email=admin@july28retail.co.zw

# Logging
logging.level.zw.co.july28=INFO
logging.level.org.springframework.security=WARN
